<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>beatingai — Take Back Your Privacy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
:root{
  --black:#060608;--white:#eeebe4;--green:#00e87a;
  --red:#ff3c3c;--mid:#111115;--dim:#1e1e24;
  --muted:#666672;--border:rgba(255,255,255,0.07);
}
body{background:var(--black);color:var(--white);font-family:'Crimson Pro',serif;overflow-x:hidden;cursor:none;}
.cursor{width:10px;height:10px;background:var(--green);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s;}
.cursor-ring{width:34px;height:34px;border:1px solid var(--green);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:.35;transition:left .1s ease,top .1s ease,width .2s,height .2s;}
@media(hover:none),(pointer:coarse){.cursor,.cursor-ring{display:none;}body{cursor:auto;}}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:5000;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:1.2rem 3rem;z-index:500;background:rgba(6,6,8,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;letter-spacing:-.03em;}
.nav-logo span{color:var(--green);}
.nav-links{display:flex;gap:2rem;align-items:center;}
.nav-links a{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s;}
.nav-links a:hover{color:var(--white);}
.nav-cta{background:var(--green)!important;color:var(--black)!important;padding:.6rem 1.3rem;font-weight:700;}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:10rem 3rem 6rem;position:relative;overflow:hidden;}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,232,122,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,232,122,.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;}
.hero-glow{position:absolute;top:30%;right:10%;width:600px;height:600px;background:radial-gradient(circle,rgba(0,232,122,.06) 0%,transparent 65%);pointer-events:none;}
.hero-scanline{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,232,122,.15),transparent);animation:scanDown 6s linear infinite;pointer-events:none;}
.hero-tag{font-family:'Space Mono',monospace;font-size:.63rem;letter-spacing:.24em;text-transform:uppercase;color:var(--green);display:flex;align-items:center;gap:.8rem;margin-bottom:2rem;opacity:0;animation:up .7s .1s forwards;}
.hero-tag::before{content:'';width:20px;height:1px;background:var(--green);}
.hero-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(3.5rem,8vw,8.5rem);line-height:.93;letter-spacing:-.03em;max-width:860px;}
.hero-title .line{display:block;opacity:0;transform:translateY(36px);}
.hero-title .line:nth-child(1){animation:up .8s .3s forwards;}
.hero-title .line:nth-child(2){animation:up .8s .5s forwards;}
.hero-title .line:nth-child(3){animation:up .8s .7s forwards;}
.hero-title .ghost{-webkit-text-stroke:1px rgba(255,255,255,.15);color:transparent;}
.hero-title .lit{color:var(--green);}
.hero-row{margin-top:3rem;display:grid;grid-template-columns:1.1fr 1fr;gap:4rem;align-items:end;max-width:860px;opacity:0;animation:up .8s .9s forwards;}
.hero-desc{font-size:1.1rem;line-height:1.85;color:rgba(238,235,228,.55);}
.hero-btns{display:flex;flex-direction:column;gap:1rem;}
.threat-bar{position:absolute;bottom:3rem;right:3rem;border:1px solid rgba(255,60,60,.3);padding:1.2rem 1.8rem;background:rgba(255,60,60,.04);opacity:0;animation:up .8s 1.2s forwards;}
.threat-label{font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--red);margin-bottom:.4rem;}
.threat-num{font-family:'Syne',sans-serif;font-weight:800;font-size:2.2rem;color:var(--red);line-height:1;}
.threat-sub{font-family:'Space Mono',monospace;font-size:.5rem;color:var(--muted);margin-top:.3rem;letter-spacing:.1em;}

/* BUTTONS */
.btn-primary{display:inline-block;background:var(--green);color:var(--black);font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;font-weight:700;padding:1.1rem 2.4rem;text-decoration:none;cursor:none;transition:transform .2s,box-shadow .2s;border:none;}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,232,122,.22);}
.btn-ghost{font-family:'Space Mono',monospace;font-size:.63rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:.5rem;transition:color .2s;background:none;border:none;cursor:none;}
.btn-ghost:hover{color:var(--white);}
.btn-ghost::after{content:'→';}
.btn-outline{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:.5rem;transition:color .2s;}
.btn-outline:hover{color:var(--white);}
.btn-outline::after{content:'→';}

/* TICKER */
.ticker{background:var(--green);padding:.85rem 0;overflow:hidden;white-space:nowrap;}
.ticker-track{display:inline-flex;animation:tick 26s linear infinite;}
.ticker-item{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--black);padding:0 2.2rem;}
.ticker-sep{color:rgba(6,6,8,.35);padding-right:2.2rem;}

/* SHARED */
.section-eyebrow{font-family:'Space Mono',monospace;font-size:.63rem;letter-spacing:.22em;text-transform:uppercase;color:var(--green);margin-bottom:1.2rem;}
.section-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2rem,4vw,3.2rem);letter-spacing:-.03em;line-height:1.05;margin-bottom:1.5rem;}
.section-title em{font-family:'Crimson Pro',serif;font-style:italic;font-weight:300;color:var(--red);}

/* THREATS */
.threat-section{padding:7rem 3rem;background:var(--mid);}
.threat-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(min(100%, 280px), 1fr));gap:1px;background:var(--dim);margin-top:3.5rem;}
.threat-card{background:var(--mid);padding:2.5rem 2rem;border-top:2px solid var(--red);transition:background .3s;}
.threat-card:hover{background:#16161c;}
.threat-icon{font-size:1.8rem;margin-bottom:1.2rem;display:block;}
.threat-name{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;margin-bottom:.8rem;}
.threat-desc{font-size:.95rem;line-height:1.75;color:var(--muted);}

/* ═══ SHOP ═══ */
.shop-section{padding:7rem 3rem;}
.shop-panel{display:none;}
.shop-panel.active{display:block;}

/* Physical products grid */
.phys-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(min(100%, 280px), 1fr));gap:1.5rem;}
.phys-card{border:1px solid var(--border);padding:2rem;transition:border-color .3s,background .3s;position:relative;}
.phys-card:hover{border-color:var(--green);background:rgba(0,232,122,.02);}
.phys-badge{position:absolute;top:1rem;right:1rem;font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;padding:.25rem .6rem;background:var(--green);color:var(--black);font-weight:700;}
.phys-badge.affiliate{background:var(--dim);color:var(--muted);border:1px solid var(--border);}
.phys-img-wrap{font-size:2.8rem;text-align:center;padding:1.5rem;background:var(--mid);margin-bottom:1.5rem;}
.phys-name{font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;margin-bottom:.5rem;}
.phys-desc{font-size:.9rem;line-height:1.65;color:var(--muted);margin-bottom:1.2rem;}
.phys-footer{display:flex;justify-content:space-between;align-items:center;margin-top:auto;}
.phys-price{font-family:'Space Mono',monospace;font-size:.85rem;color:var(--green);}
.btn-shop-link{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;background:var(--green);color:var(--black);border:none;padding:.6rem 1.2rem;cursor:none;font-weight:700;transition:opacity .2s;}
.btn-shop-link:hover{opacity:.85;}
.btn-affiliate{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;background:transparent;color:var(--muted);border:1px solid var(--border);padding:.6rem 1.2rem;cursor:none;transition:border-color .2s,color .2s;text-decoration:none;display:inline-block;}
.btn-affiliate:hover{border-color:var(--white);color:var(--white);}

/* ═══ CONSULTING / BOOKING ═══ */
.consulting-section{padding:7rem 3rem;background:var(--mid);}
.consulting-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(min(100%, 320px), 1fr));gap:4rem;margin-top:4rem;align-items:start;}
.tier-cards{display:flex;flex-direction:column;gap:1px;background:var(--dim);}
.tier-card{background:var(--mid);padding:2rem 2.5rem;transition:background .3s;position:relative;}
.tier-card.recommended{border-left:3px solid var(--green);}
.tier-card:hover{background:#16161c;}
.rec-badge{font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:var(--green);margin-bottom:.5rem;display:block;}
.tier-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;margin-bottom:.4rem;}
.tier-price{font-family:'Space Mono',monospace;font-size:1.1rem;color:var(--green);margin-bottom:.8rem;}
.tier-desc{font-size:.9rem;line-height:1.65;color:var(--muted);margin-bottom:1.2rem;}
.tier-features{list-style:none;}
.tier-features li{font-size:.88rem;color:rgba(238,235,228,.65);padding:.3rem 0;display:flex;align-items:center;gap:.6rem;}
.tier-features li::before{content:'//';font-family:'Space Mono',monospace;font-size:.55rem;color:var(--green);}
.btn-book{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;background:transparent;border:1px solid var(--border);color:var(--muted);padding:.6rem 1.4rem;cursor:none;transition:border-color .2s,color .2s,background .2s;margin-top:1.2rem;display:inline-block;width:100%;text-align:center;}
.btn-book:hover,.tier-card.
